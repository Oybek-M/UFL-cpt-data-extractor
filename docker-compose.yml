services:
  ufl:
    build: .
    image: ufl:latest
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - UFL_TOKENIZER_MODEL_ID=${UFL_TOKENIZER_MODEL_ID:-}
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["ufl", "version"]

