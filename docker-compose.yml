services:
  ufl:
    build: .
    image: ufl:latest
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - UFL_TOKENIZER_MODEL_ID=${UFL_TOKENIZER_MODEL_ID:-}
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["ufl", "version"]

  web:
    build: .
    image: ufl:latest
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
      - ./src:/app/src
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "ufl.web.app:app", "--host", "0.0.0.0", "--port", "8000"]
